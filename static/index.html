<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superset AI Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">
                <span class="logo-icon">📊</span>
                <h1>Superset<span>Agent</span></h1>
            </div>
            <div class="header-right" style="display: flex; gap: 15px; align-items: center;">
                <div class="session-stats" id="session-stats" style="font-size: 13px; color: var(--text-muted); background: rgba(255, 255, 255, 0.05); padding: 6px 12px; border-radius: 20px;">
                    Tokens: <span id="token-count" style="color: var(--text-main); font-weight: 500;">0</span> | Chi phí: <span id="session-cost" style="color: #10b981; font-weight: 500;">$0.00000</span>
                </div>
                <div class="status">
                    <span class="status-dot"></span> Online
                </div>
            </div>
        </header>

        <main id="chat-container">
            <div class="welcome-message">
                <h2>Xin chào! 👋</h2>
                <p>Tôi là trợ lý ảo Superset. Tôi có thể giúp bạn truy vấn dữ liệu, xem dataset, dashboard và nhiều hơn thế nữa.</p>
                <div class="suggestions">
                    <button onclick="sendSuggestion('Tôi đang có những bộ dataset nào?')">Dataset của tôi?</button>
                    <button onclick="sendSuggestion('Liệt kê danh sách dashboard')">Danh sách dashboard</button>
                    <button onclick="sendSuggestion('Kiểm tra sức khỏe hệ thống')">Health check</button>
                </div>
            </div>
            <!-- Messages will appear here -->
        </main>

        <div class="typing-indicator" id="typing-indicator">
            <span></span><span></span><span></span>
        </div>

        <footer>
            <form id="chat-form">
                <input type="text" id="user-input" placeholder="Hỏi tôi bất cứ điều gì về Superset..." autocomplete="off">
                <button type="submit" id="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
